name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Eval flake
        run: nix flake check --no-build -L
      - name: Eval test suite
        run: |
          nix eval --raw -f tests/eval.nix
          nix eval --raw -f tests/module-eval.nix
      - name: Build lightweight derivations
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
        run: |
          # UT4UU is small (~41 MB) and self-contained; build it for real.
          nix-build -E '(import <nixpkgs> { config.allowUnfree = true; }).callPackage ./pkgs/ut4-ut4uu.nix {}' --no-out-link
          # Engine.ini template is tiny.
          nix-build -E '(import <nixpkgs> {}).callPackage ./pkgs/ut4-engine-ini-template.nix { masterServerDomain = "master-ut4.timiimit.com"; }' --no-out-link
          # Launcher script.
          nix-build -E '(import <nixpkgs> { config.allowUnfree = true; }).callPackage ./pkgs/ut4-launcher.nix { masterServerDomain = "master-ut4.timiimit.com"; }' --no-out-link
